<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Clipster Task</title>

<style>

body{
    background:#0f1115;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.header{
    background:#171b22;
    padding:20px;
    color:#4ade80;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

a{
    color:#4ade80;
    text-decoration:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #333;
    padding:12px;
}

th{
    background:#20252f;
}

</style>

</head>

<body>

<div class="header">
🚀 Clipster Task Results
</div>

<div class="container">

<p>
<a href="/history">
← Back To History
</a>
</p>

<h3>Task ID: {{ task[0] }}</h3>
<h3>Status: {{ task[1] }}</h3>
<h3>Created: {{ task[2] }}</h3>

<table>

<tr>
<th>Duration</th>
<th>Reel URL</th>
</tr>

{% for row in results %}

<tr>

<td>{{ row[1] }}</td>

<td>
<a href="{{ row[0] }}" target="_blank">
{{ row[0] }}
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
