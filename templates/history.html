<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster History</title>

<style>

body{
    background:#0f1115;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.header{
    background:#171b22;
    padding:20px;
    font-size:28px;
    color:#4ade80;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

a{
    color:#4ade80;
    text-decoration:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #333;
    padding:12px;
}

th{
    background:#20252f;
}

</style>

</head>

<body>

<div class="header">
🚀 Clipster History
</div>

<div class="container">

<p>
<a href="/">← Back to Dashboard</a>
</p>

<table>

<tr>
<th>Task ID</th>
<th>Status</th>
<th>Created</th>
</tr>

{% for task in tasks %}

<tr>

<td>
<a href="/task/{{ task[0] }}">
{{ task[0] }}
</a>
</td>

<td>{{ task[1] }}</td>
<td>{{ task[2] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
