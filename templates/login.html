<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster Login</title>

<style>
body{
    background:#0f1115;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#171b22;
    padding:30px;
    border-radius:12px;
    width:320px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#0f1115;
    border:1px solid #333;
    color:white;
}

button{
    width:100%;
    padding:10px;
    background:#4ade80;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.switch{
    margin-top:10px;
    text-align:center;
    color:#aaa;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2 id="title">Login</h2>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password">

<button onclick="submitForm()">Submit</button>

<div class="switch" onclick="toggle()">
No account? Register here
</div>

</div>

<script>

let mode = "login";

function toggle(){
    mode = mode === "login" ? "register" : "login";

    document.getElementById("title").innerText =
        mode === "login" ? "Login" : "Register";

    document.querySelector(".switch").innerText =
        mode === "login"
        ? "No account? Register here"
        : "Already have account? Login here";
}

async function submitForm(){

    let username =
        document.getElementById("username").value;

    let password =
        document.getElementById("password").value;

    let url =
        mode === "login"
        ? "/login"
        : "/register";

    let res =
        await fetch(url, {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username,
                password
            })
        });

    let data = await res.json();

    if(mode === "register"){
        alert("Registered! Now login.");
        toggle();
        return;
    }

    if(data.api_key){
        localStorage.setItem("api_key", data.api_key);
        window.location.href = "/";
    } else {
        alert("Login failed");
    }
}

</script>

</body>
</html>
