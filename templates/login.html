<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster SaaS Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background: radial-gradient(circle at top, #0f172a, #05070d);
    overflow:hidden;
    color:white;
}

/* animated background blobs */
.blob{
    position:absolute;
    width:300px;
    height:300px;
    background:#4ade80;
    filter:blur(120px);
    opacity:0.15;
    animation: float 6s infinite ease-in-out;
}

.blob2{
    background:#facc15;
    top:60%;
    left:60%;
    animation-delay:2s;
}

@keyframes float{
    0%{transform:translate(0,0);}
    50%{transform:translate(40px,-40px);}
    100%{transform:translate(0,0);}
}

/* glass box */
.box{
    position:relative;
    z-index:2;
    width:360px;
    padding:30px;
    border-radius:18px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* title */
h2{
    margin:0;
    margin-bottom:20px;
    color:#4ade80;
    text-align:center;
}

/* inputs */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.3);
    color:white;
    outline:none;
}

/* button */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:black;

    background: linear-gradient(90deg,#4ade80,#22c55e);
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(74,222,128,0.3);
}

/* switch */
.switch{
    margin-top:12px;
    text-align:center;
    color:#aaa;
    cursor:pointer;
    font-size:13px;
}

.small{
    text-align:center;
    font-size:12px;
    color:#666;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- background effects -->
<div class="blob"></div>
<div class="blob blob2"></div>

<div class="box">

<h2 id="title">Clipster SaaS Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="submitForm()">Continue</button>

<div class="switch" onclick="toggle()">
No account? Create team account
</div>

<div class="small">
Team-based SaaS access • Clipster Automation Suite
</div>

</div>

<script>

let mode = "login";

function toggle(){

    mode = mode === "login" ? "register" : "login";

    document.getElementById("title").innerText =
        mode === "login"
        ? "Clipster SaaS Login"
        : "Create Team Account";

    document.querySelector(".switch").innerText =
        mode === "login"
        ? "No account? Create team account"
        : "Already have account? Login here";
}

async function submitForm(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let url = mode === "login" ? "/login" : "/register";

    let res = await fetch(url,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username,
            password
        })
    });

    let data = await res.json();

    if(mode === "register"){
        alert("Team account created. Now login.");
        toggle();
        return;
    }

    if(data.status === "success"){
        localStorage.setItem("role", data.role);

        // SaaS redirect logic (future: /dashboard)
        window.location.href = "/";
    } else {
        alert("Login failed");
    }
}

</script>

</body>
</html>
