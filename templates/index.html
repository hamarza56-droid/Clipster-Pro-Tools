<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster PRO Dashboard</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0f172a, #05070d);
    color:white;
}

/* HEADER */
.header{
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:18px;
    font-weight:bold;
    color:#4ade80;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* HERO */
.hero{
    padding:40px;
    text-align:center;
}

.hero h1{
    font-size:34px;
    margin-bottom:10px;
}

.hero p{
    color:#aaa;
    max-width:750px;
    margin:auto;
    line-height:1.6;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

/* GLASS CARD */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* INPUT */
textarea, input{
    width:100%;
    background: rgba(0,0,0,0.3);
    color:white;
    border:1px solid rgba(255,255,255,0.1);
    padding:12px;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
button{
    background: rgba(74,222,128,0.15);
    border:1px solid rgba(74,222,128,0.4);
    color:#4ade80;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.25s;
    margin-top:10px;
}

button:hover{
    background: rgba(74,222,128,0.25);
    transform: scale(1.03);
}

/* DISABLED BUTTON */
button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}

/* STATUS BADGE */
.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.running{
    background: rgba(250,204,21,0.15);
    color:#facc15;
    border:1px solid rgba(250,204,21,0.4);
    animation: pulse 1.5s infinite;
}

.done{
    background: rgba(74,222,128,0.15);
    color:#4ade80;
}

.cancelled{
    background: rgba(239,68,68,0.15);
    color:#ef4444;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(250,204,21,0.3);}
    70%{box-shadow:0 0 0 10px rgba(250,204,21,0);}
    100%{box-shadow:0 0 0 0 rgba(250,204,21,0);}
}

/* PROGRESS */
.progress-bar{
    width:100%;
    height:14px;
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress-fill{
    height:100%;
    width:0%;
    background: linear-gradient(90deg,#facc15,#4ade80);
    transition:0.3s;
}

/* LOGS */
.log-box{
    height:260px;
    overflow-y:auto;
    background: rgba(0,0,0,0.35);
    padding:12px;
    border-radius:12px;
    font-family:monospace;
    font-size:12px;
}

.log-line{
    color:#bbb;
    margin:2px 0;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    border:1px solid rgba(255,255,255,0.08);
    padding:10px;
}

th{
    background: rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<div class="header">
    🚀 Clipster PRO

    <div>
        <span id="statusBadge" class="status done">Idle</span>
        <button onclick="cancelTask()" id="cancelBtn">Cancel</button>
    </div>
</div>

<div class="hero">
    <h1>Instagram Reel Scraping Engine</h1>
    <p>
        Clipster PRO extracts Instagram reels, filters high-quality content,
        and processes tasks with real-time progress tracking and automation.
    </p>
</div>

<div class="container">

<!-- TASK -->
<div class="card">

<h3>Create Task</h3>

<textarea id="pages" placeholder="Enter Instagram pages (one per line)"></textarea>

<br><br>

<input id="limit" value="10">

<br>

<button onclick="startTask()" id="startBtn">Start Scraping</button>

<div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
</div>

</div>

<!-- LOGS -->
<div class="card">

<h3>Live Logs</h3>
<div class="log-box" id="logs"></div>

</div>

<!-- RESULTS -->
<div class="card">

<h3>Results</h3>

<table>
<thead>
<tr>
<th>Duration</th>
<th>Reel URL</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

</div>

</div>

<script>

let currentTask = null;

// ================= UI STATE =================

function setRunningUI(){
    document.getElementById("statusBadge").innerText = "Scraping...";
    document.getElementById("statusBadge").className = "status running";

    document.getElementById("startBtn").disabled = true;
}

function setIdleUI(){
    document.getElementById("statusBadge").innerText = "Idle";
    document.getElementById("statusBadge").className = "status done";

    document.getElementById("startBtn").disabled = false;
}

// ================= START TASK =================

async function startTask(){

    document.getElementById("logs").innerHTML = "";
    document.getElementById("progress").style.width = "0%";

    setRunningUI();

    let pages = document.getElementById("pages").value
        .split("\n")
        .filter(x => x.trim() !== "");

    let limit = parseInt(document.getElementById("limit").value);

    let res = await fetch("/create_task", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ pages, limit })
    });

    let data = await res.json();

    currentTask = data.task_id;

    log("🚀 Task started: " + currentTask);

    pollTask();
}

// ================= POLLING =================

async function pollTask(){

    if(!currentTask) return;

    let res = await fetch("/get_task/" + currentTask);
    let data = await res.json();

    if(!data.task){
        setTimeout(pollTask, 2000);
        return;
    }

    let task = data.task;

    document.getElementById("progress").style.width =
        (task.progress || 0) + "%";

    if(task.logs){
        log(task.logs);
    }

    if(task.status === "running"){
        setTimeout(pollTask, 2000);
    }

    else if(task.status === "done"){
        log("✅ Completed");
        setIdleUI();
        renderResults(data.results);
    }

    else if(task.status === "cancelled"){
        log("❌ Cancelled");
        setIdleUI();
    }
}

// ================= CANCEL =================

async function cancelTask(){

    if(!currentTask) return;

    await fetch("/cancel_task/" + currentTask);

    log("❌ Cancel requested");
}

// ================= LOG =================

function log(msg){

    let box = document.getElementById("logs");

    let div = document.createElement("div");
    div.className = "log-line";
    div.innerText = msg;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// ================= RESULTS =================

function renderResults(data){

    let html = "";

    for(let r of data){

        html += `
        <tr>
            <td>${r.duration}</td>
            <td>${r.reel_url}</td>
        </tr>`;
    }

    document.getElementById("results").innerHTML = html;
}

</script>

</body>
</html>
