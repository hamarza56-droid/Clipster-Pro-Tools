<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster PRO SaaS</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#0f172a,#05070d);
    color:white;
}

/* HEADER */
.header{
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* HERO */
.hero{
    text-align:center;
    padding:35px;
}

.hero h1{font-size:34px;}
.hero p{color:#aaa;max-width:700px;margin:auto;}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

/* INPUT */
textarea,input{
    width:100%;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    padding:12px;
    border-radius:10px;
}

/* BUTTON */
button{
    background: rgba(74,222,128,0.15);
    border:1px solid rgba(74,222,128,0.4);
    color:#4ade80;
    padding:12px 16px;
    border-radius:10px;
    cursor:pointer;
}

/* PROGRESS */
.progress{
    height:12px;
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}
.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#facc15,#4ade80);
    transition:0.3s;
}

/* LOGS */
.log-box{
    height:260px;
    overflow:auto;
    background:rgba(0,0,0,0.3);
    padding:10px;
    font-family:monospace;
    font-size:12px;
}

.log-line{color:#bbb;margin:2px 0;}

/* STATUS */
.badge{
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
}
.running{background:#facc15;color:black;}
.done{background:#4ade80;}
.cancelled{background:#ef4444;}

</style>
</head>

<body>

<div class="header">
    <h3>🚀 Clipster SaaS</h3>
    <div>
        <span id="status" class="badge done">Idle</span>
        <button onclick="cancelTask()">Cancel</button>
    </div>
</div>

<div class="hero">
    <h1>Instagram Reel Engine</h1>
    <p>Real-time scraping system with live progress, logs and queue processing.</p>
</div>

<div class="card">
<h3>Create Task</h3>

<textarea id="pages" placeholder="pages (one per line)"></textarea>
<br><br>

<input id="limit" value="10">

<br><br>

<button onclick="startTask()" id="startBtn">Start Scraping</button>

<div class="progress">
    <div class="fill" id="progress"></div>
</div>

</div>

<div class="card">
<h3>Live Logs</h3>
<div class="log-box" id="logs"></div>
</div>

<div class="card">
<h3>Results</h3>
<table width="100%">
<tbody id="results"></tbody>
</table>
</div>

<script>

let socket = io();
let currentTask = null;

// ================= SOCKET REAL TIME =================

socket.on("log", (data)=>{
    if(data.task_id !== currentTask) return;
    addLog(data.msg);
});

socket.on("progress", (data)=>{
    if(data.task_id !== currentTask) return;
    document.getElementById("progress").style.width = data.progress + "%";
});

socket.on("status", (data)=>{
    if(data.task_id !== currentTask) return;

    if(data.status === "cancelled"){
        setStatus("cancelled");
        addLog("❌ Cancelled");
    }
});

// ================= UI =================

function setStatus(type){
    let el = document.getElementById("status");
    el.className = "badge " + type;

    if(type === "running") el.innerText = "Running...";
    if(type === "done") el.innerText = "Done";
    if(type === "cancelled") el.innerText = "Cancelled";
}

// ================= START =================

async function startTask(){

    document.getElementById("logs").innerHTML = "";
    document.getElementById("progress").style.width = "0%";

    setStatus("running");

    let pages = document.getElementById("pages").value
        .split("\n").filter(x=>x.trim());

    let limit = parseInt(document.getElementById("limit").value);

    let res = await fetch("/create_task",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pages,limit})
    });

    let data = await res.json();

    currentTask = data.task_id;

    addLog("🚀 Task started: " + currentTask);
}

// ================= CANCEL =================

async function cancelTask(){

    if(!currentTask) return;

    await fetch("/cancel_task/"+currentTask);

    addLog("❌ Cancel requested");
}

// ================= LOG =================

function addLog(msg){
    let box = document.getElementById("logs");
    let d = document.createElement("div");
    d.className="log-line";
    d.innerText = msg;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
