<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster PRO Dashboard</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
    background:#0f1115;
    color:white;
    font-family:Arial;
    margin:0;
}

/* HEADER */
.header{
    background:#171b22;
    padding:20px;
    font-size:24px;
    font-weight:bold;
    color:#4ade80;
    display:flex;
    justify-content:space-between;
}

/* LAYOUT */
.container{
    width:90%;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:#171b22;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

/* INPUT */
textarea, input{
    width:100%;
    background:#0f1115;
    color:white;
    border:1px solid #333;
    padding:10px;
}

/* BUTTON */
button{
    background:#4ade80;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

/* PROGRESS BAR */
.progress-bar{
    width:100%;
    background:#333;
    height:20px;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:#4ade80;
    transition:0.3s;
}

/* LOG BOX */
.log-box{
    height:300px;
    overflow-y:auto;
    background:black;
    padding:10px;
    font-family:monospace;
    font-size:13px;
    border-radius:10px;
}

.log-line{
    margin:2px 0;
    color:#aaa;
}

.success{color:#4ade80;}
.error{color:#ef4444;}
.warn{color:#facc15;}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    border:1px solid #333;
    padding:10px;
}

</style>
</head>

<body>

<div class="header">
    🚀 Clipster PRO
    <button onclick="cancelTask()">Cancel Task</button>
</div>

<div class="container">

<!-- TASK -->
<div class="card">

<h2>Create Task</h2>

<textarea id="pages" placeholder="Enter Instagram pages"></textarea>
<br><br>

<input id="limit" value="10">

<br>

<button onclick="startTask()">Start Scraping</button>

<div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
</div>

</div>

<!-- LOGS -->
<div class="card">

<h2>Live Logs</h2>
<div class="log-box" id="logs"></div>

</div>

<!-- RESULTS -->
<div class="card">

<h2>Results</h2>

<table>
<thead>
<tr>
<th>Duration</th>
<th>URL</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

</div>

</div>

<script>

let socket = io();
let currentTask = null;

// ================= SOCKET EVENTS =================

socket.on("log", (data) => {

    if(!currentTask || data.task_id === currentTask){

        let box = document.getElementById("logs");

        let div = document.createElement("div");
        div.className = "log-line";
        div.innerText = data.msg;

        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
});

socket.on("progress", (data) => {

    if(data.task_id !== currentTask) return;

    document.getElementById("progress").style.width =
        data.progress + "%";
});


// ================= START TASK =================

async function startTask(){

    document.getElementById("logs").innerHTML = "";
    document.getElementById("progress").style.width = "0%";

    let pages = document.getElementById("pages").value
        .split("\n")
        .filter(x => x.trim() !== "");

    let limit = parseInt(document.getElementById("limit").value);

    let res = await fetch("/create_task", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ pages, limit })
    });

    let data = await res.json();

    currentTask = data.task_id;

    log("🚀 Task started: " + currentTask);
}


// ================= CANCEL TASK =================

async function cancelTask(){

    if(!currentTask) return;

    await fetch("/cancel_task/" + currentTask);

    log("❌ Cancel request sent");
}


// ================= LOG HELPER =================

function log(msg){

    let box = document.getElementById("logs");

    let div = document.createElement("div");
    div.className = "log-line";
    div.innerText = msg;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}


// ================= RENDER RESULTS =================

function renderResults(data){

    let html = "";

    for(let r of data){

        html += `
        <tr>
            <td>${r.duration}</td>
            <td><a href="${r.url}" target="_blank">${r.url}</a></td>
        </tr>`;
    }

    document.getElementById("results").innerHTML = html;
}

</script>

</body>
</html>
