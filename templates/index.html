<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Clipster Dashboard</title>

<style>

body{
    background:#0f1115;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
}

.header{
    background:#171b22;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    color:#4ade80;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header a{
    color:white;
    text-decoration:none;
    font-size:16px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.stats{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.stat-card{
    background:#171b22;
    border-radius:12px;
    padding:20px;
}

.stat-title{
    color:#aaa;
    font-size:14px;
}

.stat-value{
    font-size:34px;
    font-weight:bold;
    margin-top:10px;
    color:#4ade80;
}

.card{
    background:#171b22;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:120px;
    background:#0f1115;
    color:white;
    border:1px solid #333;
    padding:10px;
}

input{
    width:100%;
    padding:10px;
    background:#0f1115;
    color:white;
    border:1px solid #333;
}

button{
    background:#4ade80;
    color:black;
    border:none;
    padding:12px 25px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #333;
    padding:10px;
    text-align:left;
}

th{
    background:#20252f;
}

.status{
    font-size:18px;
    margin-top:10px;
}

.success{ color:#4ade80; }
.running{ color:#facc15; }
.error{ color:#ef4444; }

a{
    color:#4ade80;
}

</style>
</head>

<body>

<div class="header">
    <div>🚀 Clipster Dashboard</div>
    <div><a href="/history">View History</a></div>
</div>

<div class="container">

<!-- ================= STATS ================= -->
<div class="stats">

    <div class="stat-card">
        <div class="stat-title">Total Tasks</div>
        <div class="stat-value" id="totalTasks">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Total Reels</div>
        <div class="stat-value" id="totalReels">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Running Tasks</div>
        <div class="stat-value" id="runningTasks">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Completed Tasks</div>
        <div class="stat-value" id="completedTasks">0</div>
    </div>

</div>

<!-- ================= CREATE TASK ================= -->
<div class="card">

<h2>Start New Task</h2>

<p>Instagram Pages (one per line)</p>

<textarea id="pages"></textarea>

<br><br>

<p>Reel Limit</p>

<input id="limit" value="10">

<br>

<button id="startBtn">Start Scraping</button>

<div class="status" id="taskStatus">
No task running
</div>

</div>

<!-- ================= RESULTS ================= -->
<div class="card">

<h2>Results</h2>

<table>
<thead>
<tr>
<th>Duration</th>
<th>Reel URL</th>
</tr>
</thead>

<tbody id="resultsTable"></tbody>
</table>

</div>

</div>

<script>

let currentTask = null;

// ================= LOAD STATS =================
async function loadStats(){
    try{
        let res = await fetch("/stats");
        let data = await res.json();

        document.getElementById("totalTasks").innerText = data.total_tasks;
        document.getElementById("totalReels").innerText = data.total_reels;
        document.getElementById("runningTasks").innerText = data.running_tasks;
        document.getElementById("completedTasks").innerText = data.completed_tasks;
    } catch(e){
        console.log("Stats error:", e);
    }
}

// ================= START TASK =================
async function startTask(){

    let pages = document.getElementById("pages").value
        .split("\n")
        .filter(x => x.trim() !== "");

    let limit = parseInt(document.getElementById("limit").value);

    let res = await fetch("/create_task", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ pages, limit })
    });

    let data = await res.json();

    currentTask = data.task_id;

    document.getElementById("taskStatus").innerHTML =
        '<span class="running">Task Running...</span>';

    loadStats();
    pollTask();
}

// ================= POLL TASK =================
async function pollTask(){

    if(!currentTask) return;

    let res = await fetch("/get_task/" + currentTask);
    let data = await res.json();

    if(!data.task){
        setTimeout(pollTask, 3000);
        return;
    }

    let status = data.task[2];

    if(status === "running"){

        document.getElementById("taskStatus").innerHTML =
            '<span class="running">Scraping...</span>';

        setTimeout(pollTask, 3000);

    } else if(status === "done"){

        document.getElementById("taskStatus").innerHTML =
            '<span class="success">Completed</span>';

        renderResults(data.results);
        loadStats();

    } else {

        document.getElementById("taskStatus").innerHTML =
            '<span class="error">Error</span>';
    }
}

// ================= RESULTS =================
function renderResults(results){

    let html = "";

    for(let reel of results){
        html += `
        <tr>
            <td>${reel[1]}</td>
            <td>
                <a href="${reel[0]}" target="_blank">
                    ${reel[0]}
                </a>
            </td>
        </tr>`;
    }

    document.getElementById("resultsTable").innerHTML = html;
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("startBtn").addEventListener("click", startTask);
    loadStats();
});

</script>

</body>
</html>
