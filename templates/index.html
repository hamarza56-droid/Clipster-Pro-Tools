<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster SaaS Dashboard</title>

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    font-family: Inter, Arial, sans-serif;
    background:
        radial-gradient(circle at top,#0f172a,#05070d),
        linear-gradient(180deg,#0b1220,#05070d);
    color:white;
}

/* subtle noise */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:url("https://www.transparenttextures.com/patterns/noise.png");
    opacity:0.04;
    pointer-events:none;
}

/* ================= LAYOUT ================= */
.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    background:rgba(255,255,255,0.03);
    backdrop-filter: blur(18px);
    border-right:1px solid rgba(255,255,255,0.06);
    padding:20px;
}

.logo{
    font-size:18px;
    font-weight:bold;
    color:#4ade80;
    margin-bottom:30px;
}

.nav a{
    display:block;
    padding:12px;
    margin-bottom:8px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.25s;
}

.nav a:hover{
    border-color:#4ade80;
    transform:translateX(5px);
}

/* ================= MAIN ================= */
.main{
    flex:1;
    padding:25px;
}

/* ================= TOP BAR ================= */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search{
    width:60%;
}

.search input{
    width:100%;
    padding:12px;
    border-radius:12px;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.08);
    color:white;
}

/* ================= CARDS ================= */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    backdrop-filter: blur(18px);
    transition:0.25s;
}

.card:hover{
    transform:translateY(-4px);
    border-color:rgba(74,222,128,0.3);
}

/* ================= STATS ================= */
.stat{
    font-size:22px;
    font-weight:bold;
    color:#4ade80;
}

/* ================= BUTTON ================= */
button{
    padding:10px 14px;
    border-radius:12px;
    background:rgba(74,222,128,0.12);
    border:1px solid rgba(74,222,128,0.4);
    color:#4ade80;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(74,222,128,0.15);
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🚀 Clipster SaaS</div>

    <div class="nav">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/scraper.html">Scraper Engine</a>
        <a href="/campaigns.html">Campaigns</a>
        <a href="/team.html">Team Hub</a>
        <a href="/editor.html">Reel Editor</a>
        <a href="/history.html">History</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">
    <h2>Dashboard</h2>

    <div class="search">
        <input placeholder="Search tools, campaigns, tasks...">
    </div>
</div>

<!-- STATS GRID -->
<div class="grid">

<div class="card">
    <div>Total Tasks</div>
    <div class="stat">128</div>
</div>

<div class="card">
    <div>Active Campaigns</div>
    <div class="stat">6</div>
</div>

<div class="card">
    <div>Team Members</div>
    <div class="stat">4</div>
</div>

</div>

<br>

<div class="card">
    <h3>System Overview</h3>
    <p style="color:#aaa">
        Clipster SaaS automation dashboard for managing scraping, campaigns,
        team workflow and reel processing pipeline.
    </p>
</div>

</div>

</div>

</body>
</html>
