<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster PRO | SaaS Tools Suite</title>

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    font-family: Inter, system-ui, Arial;
    background:#05070d;
    color:white;
    overflow-x:hidden;
}

::selection{
    background:#4ade80;
    color:black;
}

/* ================= BACKGROUND ================= */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.blob{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#4ade80,transparent 70%);
    filter:blur(140px);
    opacity:0.22;
    animation:float 10s infinite ease-in-out;
}

.blob2{
    top:45%;
    left:60%;
    background:radial-gradient(circle,#facc15,transparent 70%);
}

@keyframes float{
    0%{transform:translate(0,0);}
    50%{transform:translate(60px,-40px);}
    100%{transform:translate(0,0);}
}

body:before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://grainy-gradients.vercel.app/noise.svg');
    opacity:0.04;
}

/* ================= NAV ================= */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{color:#4ade80;font-weight:700;}

.menuBtn{cursor:pointer;font-size:22px;}

/* ================= SIDEBAR ================= */
.sidebar{
    position:fixed;
    left:-260px;
    top:0;
    width:260px;
    height:100%;
    background:rgba(10,12,18,0.95);
    backdrop-filter:blur(20px);
    transition:0.3s;
    padding:20px;
}

.sidebar.active{left:0;}

/* ================= HERO ================= */
.hero{
    text-align:center;
    padding:80px 20px 20px;
}

.hero h1{
    font-size:52px;
    background:linear-gradient(90deg,#4ade80,#facc15);
    -webkit-background-clip:text;
}

/* ================= CAMPAIGNS ================= */
.ticker{
    overflow:hidden;
    white-space:nowrap;
    padding:10px 0;
    border-top:1px solid rgba(255,255,255,0.06);
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.track{
    display:inline-block;
    animation:scroll 18s linear infinite;
}

@keyframes scroll{
    0%{transform:translateX(100%);}
    100%{transform:translateX(-100%);}
}

.campaign{
    display:inline-block;
    margin:0 30px;
    padding:10px 14px;
    background:rgba(255,255,255,0.04);
    border-radius:12px;
}

/* ================= TOOLS ================= */
.section{
    width:90%;
    max-width:1100px;
    margin:auto;
    margin-top:60px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.04);
    padding:20px;
    border-radius:14px;
    cursor:pointer;
}

/* ================= WORKSPACE ================= */
.panel{
    margin-top:20px;
    padding:20px;
    background:rgba(255,255,255,0.04);
    border-radius:14px;
}

/* ================= REEL EDITOR (NEW) ================= */
.editor{
    display:none;
    margin-top:20px;
    padding:20px;
    background:rgba(255,255,255,0.04);
    border-radius:14px;
}

.preview{
    width:100%;
    height:260px;
    background:#111;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#666;
}

.controls{
    margin-top:15px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.controls input{
    padding:10px;
    background:#000;
    border:1px solid #333;
    color:white;
    border-radius:8px;
}

/* ================= BUTTON ================= */
button{
    margin-top:10px;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #4ade80;
    background:rgba(74,222,128,0.15);
    color:#4ade80;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h3>Tools</h3>
    <div onclick="openTool('scraper')">Scraper</div>
    <div onclick="openTool('editor')">Reel Editor</div>
    <div>Campaign Manager</div>
    <div>Team Hub</div>
</div>

<div class="nav">
    <div class="logo">Clipster PRO</div>
    <div class="menuBtn" onclick="toggle()">☰</div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Automate Clipster Workflow</h1>
</div>

<!-- CAMPAIGNS -->
<div class="ticker">
<div class="track">

<div class="campaign">
cs2skin.com<br><small>Upload CS2 content</small>
</div>

<div class="campaign">
hellcase<br><small>Case opening reels</small>
</div>

<div class="campaign">
tradeit.gg<br><small>Trading clips</small>
</div>

</div>
</div>

<!-- TOOL GRID -->
<div class="section">

<div class="grid">
<div class="card" onclick="openTool('scraper')">Instagram Scraper</div>
<div class="card" onclick="openTool('editor')">Reel Editor</div>
<div class="card">Campaign Manager</div>
<div class="card">Team Hub</div>
</div>

</div>

<!-- WORKSPACE -->
<div class="section">

<div class="panel" id="scraperPanel">
<h3>Scraper Tool</h3>
<textarea placeholder="pages"></textarea>
</div>

<!-- REEL EDITOR -->
<div class="editor" id="editorPanel">

<h3>Reel Editor</h3>

<div class="preview">
Upload preview will appear here
</div>

<div class="controls">

<input placeholder="Crop Start (sec)">
<input placeholder="Crop End (sec)">
<input placeholder="Overlay Logo URL">
<input placeholder="Background Type">

</div>

<button>Process Reel</button>

</div>

</div>

<script>

function toggle(){
document.getElementById("sidebar").classList.toggle("active");
}

function openTool(t){

document.getElementById("scraperPanel").style.display="none";
document.getElementById("editorPanel").style.display="none";

if(t==="scraper"){
document.getElementById("scraperPanel").style.display="block";
}

if(t==="editor"){
document.getElementById("editorPanel").style.display="block";
}
}

</script>

</body>
</html>
