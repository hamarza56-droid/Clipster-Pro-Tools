<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clipster SaaS Control Center</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

/* ========== BASE ========== */
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#0f172a,#05070d);
    color:white;
    display:flex;
}

/* ========== SIDEBAR ========== */
.sidebar{
    width:240px;
    height:100vh;
    background:rgba(255,255,255,0.03);
    border-right:1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    padding:20px;
}

.logo{
    color:#4ade80;
    font-weight:bold;
    margin-bottom:30px;
    font-size:18px;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.nav button{
    background:transparent;
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    text-align:left;
}

.nav button:hover{
    border-color:#4ade80;
}

/* ========== MAIN ========== */
.main{
    flex:1;
    padding:25px;
}

/* ========== HEADER ========== */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* ========== MODULES ========== */
.module{
    display:none;
}

.active{
    display:block;
}

/* ========== CARD ========== */
.card{
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    backdrop-filter: blur(15px);
}

/* ========== INPUT ========== */
textarea,input{
    width:100%;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    padding:12px;
    border-radius:10px;
}

/* ========== BUTTON ========== */
button{
    background: rgba(74,222,128,0.15);
    border:1px solid rgba(74,222,128,0.4);
    color:#4ade80;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

button:disabled{
    opacity:0.4;
}

/* ========== STATUS ========== */
.badge{
    padding:6px 12px;
    border-radius:20px;
}

.running{background:#facc15;color:black;}
.done{background:#4ade80;}
.cancelled{background:#ef4444;}

/* ========== PROGRESS ========== */
.progress{
    height:12px;
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#facc15,#4ade80);
}

.log-box{
    height:240px;
    overflow:auto;
    background:rgba(0,0,0,0.3);
    padding:10px;
    font-family:monospace;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🚀 Clipster SaaS</div>

    <div class="nav">
        <button onclick="show('scraper')">🕷 Scraper</button>
        <button onclick="show('editor')">🎬 Reel Editor</button>
        <button onclick="show('campaigns')">🏷 Campaigns</button>
        <button onclick="show('team')">👥 Team</button>
        <button onclick="show('history')">📜 History</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">
    <div id="status" class="badge done">Idle</div>
    <button onclick="cancelTask()">Cancel</button>
</div>

<!-- ========== SCRAPER ========== -->
<div id="scraper" class="module active">

<div class="card">
<h3>Scraper Engine</h3>

<textarea id="pages" placeholder="Instagram pages"></textarea>
<br><br>

<input id="limit" value="10">

<br><br>

<button id="startBtn" onclick="startTask()">Start Scraping</button>

<div class="progress">
    <div class="fill" id="progress"></div>
</div>
</div>

<div class="card">
<h3>Live Logs</h3>
<div class="log-box" id="logs"></div>
</div>

</div>

<!-- ========== EDITOR (UI ONLY) ========== -->
<div id="editor" class="module">
<div class="card">
<h3>Reel Editor (UI Mock)</h3>
<p>Upload reel → crop → background change → logo overlay</p>
</div>
</div>

<!-- ========== CAMPAIGNS ========== -->
<div id="campaigns" class="module">
<div class="card">
<h3>Campaign Manager</h3>
<p>Define rules, logos, filters (UI only for now)</p>
</div>
</div>

<!-- ========== TEAM ========== -->
<div id="team" class="module">
<div class="card">
<h3>Team Dashboard</h3>
<p>Members, earnings, submissions (UI placeholder)</p>
</div>
</div>

<!-- ========== HISTORY ========== -->
<div id="history" class="module">
<div class="card">
<h3>History</h3>
<p>Task history UI placeholder</p>
</div>
</div>

</div>

<script>

let currentTask = null;

/* ========== NAV ========== */
function show(id){
    document.querySelectorAll('.module')
    .forEach(m => m.classList.remove('active'));

    document.getElementById(id).classList.add('active');
}

/* ========== UI STATE ========== */
function setRunning(){
    document.getElementById("status").innerText = "Running...";
    document.getElementById("status").className = "badge running";
    document.getElementById("startBtn").disabled = true;
}

function setIdle(){
    document.getElementById("status").innerText = "Idle";
    document.getElementById("status").className = "badge done";
    document.getElementById("startBtn").disabled = false;
}

/* ========== START TASK ========== */
async function startTask(){

    document.getElementById("logs").innerHTML = "";
    document.getElementById("progress").style.width = "0%";

    setRunning();

    let pages = document.getElementById("pages").value
        .split("\n").filter(x => x.trim());

    let limit = parseInt(document.getElementById("limit").value);

    let res = await fetch("/create_task",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pages,limit})
    });

    let data = await res.json();
    currentTask = data.task_id;

    log("Task started: " + currentTask);

    poll();
}

/* ========== POLLING ========== */
async function poll(){

    if(!currentTask) return;

    let res = await fetch("/get_task/" + currentTask);
    let data = await res.json();

    if(!data.task){
        setTimeout(poll,1500);
        return;
    }

    let t = data.task;

    document.getElementById("progress").style.width =
        (t.progress || 0) + "%";

    if(t.logs) log(t.logs);

    if(t.status === "running"){
        setTimeout(poll,1500);
    }

    else if(t.status === "done"){
        log("Completed");
        setIdle();
    }

    else if(t.status === "cancelled"){
        log("Cancelled");
        setIdle();
    }
}

/* ========== CANCEL ========== */
async function cancelTask(){
    if(!currentTask) return;
    await fetch("/cancel_task/" + currentTask);
    log("Cancel requested");
}

/* ========== LOG ========== */
function log(msg){
    let box = document.getElementById("logs");
    let d = document.createElement("div");
    d.innerText = msg;
    box.appendChild(d);
}

</script>

</body>
</html>
