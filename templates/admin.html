<!DOCTYPE html>
<html>
<head>
<title>Clipster Admin</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#05070d;
    color:white;
}
.section{
    padding:20px;
}
.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin:10px 0;
    border-radius:12px;
}
h2{color:#4ade80;}
</style>
</head>

<body>

<div class="section">
<h2>🔥 Kaelrix Admin Panel</h2>

<div class="card" id="users"></div>
<div class="card" id="tasks"></div>
<div class="card" id="campaigns"></div>

</div>

<script>

async function load(){

    let res = await fetch("/admin/data");
    let data = await res.json();

    document.getElementById("users").innerHTML =
        "<b>Users:</b><br>" + JSON.stringify(data.users, null, 2);

    document.getElementById("tasks").innerHTML =
        "<b>Tasks:</b><br>" + JSON.stringify(data.tasks, null, 2);

    document.getElementById("campaigns").innerHTML =
        "<b>Campaigns:</b><br>" + JSON.stringify(data.campaigns, null, 2);
}

load();

</script>

</body>
</html>
